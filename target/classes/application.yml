server:
  port: 8080

spring:
  application:
    name: nexus

  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_db
    username: nexus_user
    password: nexus3282
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    br.nexus: DEBUG
    org.hibernate.SQL: DEBUG