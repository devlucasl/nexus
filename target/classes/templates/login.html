<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NEXUS - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            width: 360px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
        }
        p.subtitle {
            color: #aaa;
            text-align: center;
            margin-bottom: 30px;
            font-size: 13px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0f3460;
            color: white;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #c73652; }
        .error {
            background: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 13px;
        }
        .success {
            background: #44bb44;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h1>NEXUS</h1>
    <p class="subtitle">Gestão Inteligente de Estoque</p>

    <div th:if="${param.error}" class="error">
        Usuário ou senha inválidos.
    </div>
    <div th:if="${param.logout}" class="success">
        Logout realizado com sucesso.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Login" required autofocus/>
        <input type="password" name="password" placeholder="Senha" required/>
        <button type="submit">Entrar</button>
    </form>
</div>
</body>
</html>
