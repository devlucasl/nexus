<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>NEXUS - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
        }
        header {
            background: #16213e;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e94560;
        }
        header h1 { color: #e94560; font-size: 22px; }
        header span { color: #aaa; font-size: 14px; }
        .logout-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover { background: #c73652; }
        .container {
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h2 { margin-bottom: 24px; color: #e94560; }
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .card {
            background: #16213e;
            padding: 24px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #0f3460;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: #e94560; }
        .card h3 { color: #e94560; margin-bottom: 8px; }
        .card p { color: #aaa; font-size: 13px; }
    </style>
</head>
<body>
<header>
    <h1>NEXUS</h1>
    <span>Bem-vindo, <strong th:text="${#authentication.name}"></strong>
            (<span sec:authentication="principal.authorities"></span>)
        </span>
    <form th:action="@{/logout}" method="post" style="display:inline">
        <button type="submit" class="logout-btn">Sair</button>
    </form>
</header>

<div class="container">
    <h2>Painel Principal</h2>
    <div class="cards">
        <div class="card">
            <h3>📦 Produtos</h3>
            <p>Cadastrar e gerenciar produtos</p>
        </div>
        <div class="card">
            <h3>📊 Estoque</h3>
            <p>Entradas e saídas de estoque</p>
        </div>
        <div class="card">
            <h3>🛒 Vendas</h3>
            <p>Pedidos e vendas</p>
        </div>
        <div class="card">
            <h3>🏷️ Categorias</h3>
            <p>Organizar categorias</p>
        </div>
        <div class="card">
            <h3>🚚 Fornecedores</h3>
            <p>Gerenciar fornecedores</p>
        </div>
        <div class="card">
            <h3>🎯 Promoções</h3>
            <p>Cadastrar promoções</p>
        </div>
    </div>
</div>
</body>
</html>
